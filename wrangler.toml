name = "leck-construction-site"
main = "src/index.js"
compatibility_date = "2024-09-23"

[assets]
directory = "./public"
binding = "ASSETS"
# Run the Worker before static assets so it can take over /vacancies and /news
# (which also exist as static .html). Everything else falls through to assets.
run_worker_first = true

[vars]
SANITY_PROJECT_ID = "mwcxu5ei"
SANITY_DATASET = "production"
